name: Validate

on:
  push:
  pull_request:

jobs:
  demo-workspace:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate demo workspace
        run: python scripts/validate_workspace.py --data-dir demo --read-only

      - name: Check Flask app routes
        run: PYTHONPATH=app python -m flask --app server routes
